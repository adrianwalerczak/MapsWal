<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Meta tagi dla iOS (iPhone) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lokalizator">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">

    <title>Lokalizator Znajomych</title>
    
    <!-- Konfiguracja PWA -->
    <link rel="manifest" href='data:application/json,{"name":"Lokalizator Grupy","short_name":"Lokalizator","start_url":"/MapsWal/index.html","display":"standalone","background_color":"#0f172a","theme_color":"#4f46e5","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/854/854878.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        window.currentUser = null;
        window.authReady = false;
        window.map = null;
        window.markers = {};
        window.deferredPrompt = null;

        // Rejestracja Service Workera
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW error:', err));
            });
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Załadowanie biblioteki map
        const lscript = document.createElement('script');
        lscript.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
        document.head.appendChild(lscript);
        const lstyle = document.createElement('link');
        lstyle.rel = "stylesheet";
        lstyle.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
        document.head.appendChild(lstyle);

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lokalizator-znajomych';

        const ALLOWED_NAMES = ["Julia", "Agnieszka", "Adrian", "Aleksandra"];

        // Obsługa instalacji
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
            const installBtn = document.getElementById('pwa-install-btn');
            if (installBtn) installBtn.classList.remove('hidden');
        });

        window.installPWA = async () => {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                const { outcome } = await window.deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-install-btn').classList.add('hidden');
                }
                window.deferredPrompt = null;
            }
        };

        window.login = async () => {
            const input = document.getElementById('login-code');
            const code = input.value.trim();
            
            if (ALLOWED_NAMES.includes(code)) {
                window.currentUser = code;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth error:", error);
                }
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                err.innerText = "Nieprawidłowe imię.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && window.currentUser) {
                window.authReady = true;
                const userDisplay = document.getElementById('user-display');
                if (userDisplay) userDisplay.innerText = window.currentUser;
                initMap();
                startTracking();
                listenToOthers();
            }
        });

        function initMap() {
            if (window.map) return;
            setTimeout(() => {
                window.map = L.map('map', { zoomControl: false }).setView([52.2297, 21.0122], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OSM'
                }).addTo(window.map);
                L.control.zoom({ position: 'bottomright' }).addTo(window.map);
            }, 500);
        }

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(async (position) => {
                    if (!window.authReady || !auth.currentUser) return;
                    const { latitude, longitude } = position.coords;
                    try {
                        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', window.currentUser);
                        await setDoc(userRef, {
                            name: window.currentUser,
                            lat: latitude,
                            lng: longitude,
                            lastSeen: Date.now(),
                            uid: auth.currentUser.uid
                        }, { merge: true });

                        if (window.map) {
                            if (!window.markers[window.currentUser]) {
                                window.map.setView([latitude, longitude], 15);
                            }
                            updateMarker({ name: window.currentUser, lat: latitude, lng: longitude, lastSeen: Date.now(), isMe: true });
                        }
                    } catch (e) { console.error(e); }
                }, null, { enableHighAccuracy: true });
            }
        }

        function listenToOthers() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'locations');
            onSnapshot(colRef, (snapshot) => {
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.name !== window.currentUser) updateMarker(data);
                });
            });
        }

        function updateMarker(data) {
            if (!window.map) return;
            const pos = [data.lat, data.lng];
            if (window.markers[data.name]) {
                window.markers[data.name].setLatLng(pos);
            } else {
                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color: ${data.isMe ? '#3b82f6' : '#ef4444'};" class="w-8 h-8 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-white text-[10px] font-bold">${data.name[0]}</div>`,
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                });
                window.markers[data.name] = L.marker(pos, { icon }).addTo(window.map)
                    .bindPopup(`<b>${data.name}</b>`);
            }
        }
    </script>
    <style>
        #map { height: 100%; width: 100%; z-index: 1; }
        .hidden { display: none; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body, html { height: 100%; margin: 0; padding: 0; position: fixed; width: 100%; }
        .custom-div-icon { background: none; border: none; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <!-- EKRAN LOGOWANIA -->
    <div id="login-screen" class="flex flex-col items-center justify-center h-full p-6 bg-slate-900">
        <div class="bg-white text-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <div class="mb-6"><i class="fas fa-location-arrow text-indigo-600 text-6xl"></i></div>
            <h1 class="text-2xl font-bold mb-4">Gdzie jesteśmy?</h1>
            <input type="text" id="login-code" placeholder="Twoje imię..." 
                   class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 mb-4 text-center font-bold outline-none focus:border-indigo-600 transition-all">
            <button onclick="window.login()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform">
                URUCHOM MAPĘ
            </button>
            <p id="error-msg" class="text-red-500 text-sm mt-4 hidden font-semibold"></p>

            <button id="pwa-install-btn" onclick="window.installPWA()" class="mt-8 hidden w-full border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                <i class="fas fa-mobile-screen"></i> Zainstaluj jako aplikację
            </button>
            
            <div class="mt-8 pt-6 border-t border-gray-100 text-[10px] text-gray-400 uppercase tracking-widest">
                Rodzinny lokalizator GPS
            </div>
        </div>
    </div>

    <!-- EKRAN MAPY -->
    <div id="app-screen" class="hidden h-full flex flex-col">
        <header class="p-4 flex justify-between items-center glass border-b border-gray-200 text-slate-900 z-10 shadow-sm">
            <h2 class="font-black text-lg tracking-tight">LOKALIZATOR</h2>
            <div id="user-display" class="text-xs font-bold text-white px-4 py-1.5 bg-indigo-600 rounded-full shadow-md">...</div>
        </header>

        <main class="flex-grow relative">
            <div id="map"></div>
        </main>

        <footer class="p-4 glass text-slate-900 flex justify-center items-center gap-8 text-[11px] font-bold z-10 border-t border-gray-200">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-blue-500 rounded-full"></div> JA
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-red-500 rounded-full"></div> RODZINA
            </div>
        </footer>
    </div>
</body>
</html>
